<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Camping Cloob 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">
    <main id="game-container">
      <canvas id="game"></canvas>

      <div id="dpad">
        <button data-dir="up">↑</button>
        <button data-dir="left">←</button>
        <button data-dir="right">→</button>
        <button data-dir="down">↓</button>
      </div>

      <div id="cat-toast" aria-live="polite">yay!!!!</div>
    </main>

    <aside id="sidebar">
      <h1>CAMPING<br />CLOOB<br />2026</h1>

      <p class="intro">
        Welcome to the camping cloob! We are adventuring driving distance around NYC.
        Sign up for spots to go on trips or peep our calendar to see what day trips
        we will be rallying around. Hope to see you outside this summer!
      </p>

      <div id="countdown">Opens in ...</div>

      <h2>Trips</h2>
      <ul id="trip-list"></ul>
    </aside>
  </div>

  <button id="menu-button">Trips</button>

  <script src="./script.js"></script>
</body>
</html>
