<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Camping Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <div id="game-container">
      <canvas id="game"></canvas>

      <!-- DPAD -->
      <div id="dpad">
        <button data-dir="up">↑</button>
        <button data-dir="left">←</button>
        <button data-dir="right">→</button>
        <button data-dir="down">↓</button>
      </div>
    </div>

    <div id="sidebar">
      <button id="back-button">Back</button>

      <h1 id="title">CAMPING CLOOB 2026</h1>

      <div id="intro">
        <p>
          Welcome to the camping cloob! We are adventuring driving distance around NYC.
          Sign up for spots to go on trips or peep our calendar to see what day trips
          we will be rallying around. Hope to see you outside this summer!
        </p>
      </div>

      <div id="countdown"></div>

      <h2>Trips</h2>
      <ul id="trip-list"></ul>
    </div>
  </div>

  <button id="menu-button">Trips</button>

  <script src="./script.js" defer></script>
</body>
</html>
