<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <title>Camping Cloob</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />

  <!-- FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <div id="app">

    <div id="game-container">

      <canvas id="game"></canvas>

      <!-- MOBILE DPAD -->

      <div id="dpad">

        <button data-dir="up">↑</button>
        <button data-dir="left">←</button>
        <button data-dir="right">→</button>
        <button data-dir="down">↓</button>

      </div>

    </div>

    <!-- SIDEBAR -->

    <div id="sidebar">

      <button id="back-button">Back</button>

      <h1 id="title">
        CAMPING<br>
        CLOOB 2026
      </h1>

      <div id="intro">

        <p>
          Welcome to the camping cloob! We are adventuring driving distance around NYC.
          Sign up for spots to go on trips or peep our calendar to see what day trips
          we will be rallying around. Hope to see you outside this summer!
        </p>

      </div>

      <div id="countdown"></div>

      <h2 id="trips-heading">Trips</h2>

      <ul id="trip-list"></ul>

    </div>

  </div>

  <!-- MOBILE MENU BUTTON -->

  <button id="menu-button">Trips</button>

  <script src="./script.js" defer></script>

</body>
</html>
